name: Code security scan

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/code-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/code-test.yml"
  workflow_dispatch:

concurrency:
  group: code-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-scan:
    name: Trivy dependency scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run Trivy vulnerability scanner
        id: scan
        continue-on-error: true
        env:
          TRIVY_VERSION: ${{ vars.TRIVY_VERSION || 'v0.72.0' }}
        run: |
          set -euo pipefail
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin "$TRIVY_VERSION"

          for i in 1 2 3 4 5; do
            echo "Attempt $i to run Trivy scan..."
            if trivy fs \
              --cache-dir .trivy-cache \
              --format table \
              --ignore-unfixed \
              --output trivy.txt \
              --severity HIGH,CRITICAL \
              --table-mode detailed \
              --skip-dirs node_modules,target,dist,.icp/cache \
              .; then
              echo "scan_success=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i failed. Waiting before retry..."
            sleep $((2 ** (i - 1)))
          done

          echo "scan_success=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Validate Trivy output
        id: validate_trivy
        run: |
          if [ ! -s trivy.txt ]; then
            echo "Trivy output file is empty or does not exist."
            echo "scan_valid=false" >> "$GITHUB_OUTPUT"
          elif grep -qi "error" trivy.txt; then
            echo "Trivy scan encountered an error:"
            cat trivy.txt
            echo "scan_valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "scan_valid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Trivy output to summary
        if: steps.validate_trivy.outputs.scan_valid == 'true'
        run: |
          if [ -s trivy.txt ]; then
            {
              echo "### Trivy scan (HIGH, CRITICAL)"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```'
              cat trivy.txt
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Archive Trivy result
        if: steps.validate_trivy.outputs.scan_valid == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: trivy-result
          path: trivy.txt
          retention-days: 14

      - name: Check Trivy result and manage issue
        env:
          SCAN_SUCCESS: ${{ steps.scan.outputs.scan_success }}
          TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Bangkok' }}
        run: |
          set -euo pipefail

          ISSUE_NUMBER=$(gh issue list --search "Code Dependency Scan Failed" --state open --json number --jq '.[0].number // empty')

          if [ -s trivy.txt ] && [ "$SCAN_SUCCESS" = "true" ] && grep -q "Total: [1-9][0-9]*" trivy.txt; then
            gh label create vulnerability --description "Dependency vulnerability" --color C13B4F --force || true
            ISSUE_BODY=$(cat << EOF
          # Code dependency scan failed

          **Commit:** \`${GITHUB_SHA:0:7}\`
          **Scan date:** $(TZ="$TIMEZONE" date '+%Y-%m-%d %H:%M:%S %Z')
          **Workflow run:** [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})

          High or critical vulnerabilities were detected.

          <details>
          <summary>Scan results</summary>

          \`\`\`
          $(cat trivy.txt)
          \`\`\`
          </details>
          EOF
          )

            if [ -z "$ISSUE_NUMBER" ]; then
              gh issue create \
                --title "Code Dependency Scan Failed" \
                --body "$ISSUE_BODY" \
                --label "vulnerability"
            else
              gh issue edit "$ISSUE_NUMBER" --body "$ISSUE_BODY"
              gh issue comment "$ISSUE_NUMBER" --body "Scan still failing on \`${GITHUB_SHA:0:7}\` (run #${GITHUB_RUN_NUMBER})."
            fi

            if [ "${{ github.event_name }}" = "pull_request" ]; then
              gh pr comment "${{ github.event.pull_request.number }}" --body "$ISSUE_BODY"
            fi
            exit 1
          fi

          if [ "$SCAN_SUCCESS" != "true" ]; then
            echo "Trivy scan failed after retries." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue close "$ISSUE_NUMBER" --comment "Scan passed on \`${GITHUB_SHA:0:7}\` (run #${GITHUB_RUN_NUMBER})."
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "Trivy scan passed for \`${GITHUB_SHA:0:7}\`."
          fi
