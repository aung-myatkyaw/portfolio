name: Deploy to ICP

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "icp.yaml"
      - ".icp/data/**"
      - "package.json"
      - "package-lock.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - "index.html"
      - "vite.config.js"
      - "tailwind.config.js"
      - "postcss.config.js"
      - ".github/workflows/icp-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "full — deploy backend + portfolio WASM; sync — backend deploy + portfolio asset sync only"
        required: false
        default: full
        type: choice
        options:
          - full
          - sync

concurrency:
  group: icp-deploy-mainnet
  cancel-in-progress: false

env:
  ICP_IDENTITY_NAME: ${{ vars.ICP_IDENTITY_NAME || 'personal' }}
  ICP_CLI_VERSION: ${{ vars.ICP_CLI_VERSION || '1.0.2' }}
  NODE_VERSION: ${{ vars.NODE_VERSION || '22' }}

jobs:
  deploy:
    name: Build & deploy to ICP mainnet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Vite build env (contact form)
        run: |
          umask 077
          cat > .env.production <<EOF
          VITE_EMAILJS_SERVICE_ID=${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          EOF

      - name: Install icp-cli
        run: npm install -g @icp-sdk/icp-cli@${{ env.ICP_CLI_VERSION }} @icp-sdk/ic-wasm

      - name: Check ICP CLI version
        run: icp --version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Import ICP identity
        env:
          ICP_IDENTITY_PEM: ${{ secrets.ICP_IDENTITY_PEM }}
        run: |
          set -euo pipefail
          if [ -z "$ICP_IDENTITY_PEM" ]; then
            echo "::error::ICP_IDENTITY_PEM secret is not set"
            exit 1
          fi
          umask 077
          printf '%s' "$ICP_IDENTITY_PEM" > /tmp/icp-identity.pem
          icp identity import --storage plaintext --from-pem /tmp/icp-identity.pem "${{ env.ICP_IDENTITY_NAME }}"
          rm -f /tmp/icp-identity.pem
          icp identity default "${{ env.ICP_IDENTITY_NAME }}"

      - name: Deploy to ICP
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail

          DEPLOY_MODE="${{ github.event.inputs.deploy_mode || vars.ICP_DEPLOY_MODE || 'full' }}"
          echo "Deploy mode: $DEPLOY_MODE"

          echo "Deploying backend canister..."
          icp deploy backend -e ic --identity "${{ env.ICP_IDENTITY_NAME }}"

          if [ -n "${OPENROUTER_API_KEY:-}" ]; then
            echo "Setting OpenRouter API key on backend canister..."
            icp canister call backend set_api_key "(\"${OPENROUTER_API_KEY}\")" \
              -e ic --identity "${{ env.ICP_IDENTITY_NAME }}"
          else
            echo "::warning::OPENROUTER_API_KEY not set — skipping set_api_key (existing stable-memory key is preserved on upgrade)"
          fi

          if [ "$DEPLOY_MODE" = "sync" ]; then
            echo "Syncing portfolio assets (skipping asset canister WASM reinstall)..."
            npm run build -- --mode production
            icp sync portfolio -e ic --identity "${{ env.ICP_IDENTITY_NAME }}"
          else
            echo "Full deploy for portfolio canister..."
            icp deploy portfolio -e ic --identity "${{ env.ICP_IDENTITY_NAME }}"
          fi

      - name: Verify deployment
        run: |
          icp canister status backend -e ic --identity "${{ env.ICP_IDENTITY_NAME }}"
          icp canister status portfolio -e ic --identity "${{ env.ICP_IDENTITY_NAME }}"

      - name: Ensure custom domains are registered
        if: vars.ICP_CUSTOM_DOMAINS != ''
        env:
          DOMAINS: ${{ vars.ICP_CUSTOM_DOMAINS }}
        run: |
          set -euo pipefail
          IFS=',' read -ra DOMAIN_LIST <<< "$DOMAINS"
          FAILED=0

          for DOMAIN in "${DOMAIN_LIST[@]}"; do
            DOMAIN=$(echo "$DOMAIN" | xargs)
            [ -z "$DOMAIN" ] && continue

            echo "━━━ $DOMAIN ━━━"
            STATUS=$(curl -sL "https://icp.net/custom-domains/v1/${DOMAIN}" \
              | jq -r '.data.registration_status // "unregistered"')

            if [ "$STATUS" = "registered" ]; then
              echo "Already registered — skipping."
              continue
            fi

            VALIDATE=$(curl -sL "https://icp.net/custom-domains/v1/${DOMAIN}/validate" \
              | jq -r '.data.validation_status // "invalid"')
            if [ "$VALIDATE" != "valid" ]; then
              echo "::warning::DNS validation failed for $DOMAIN — check README custom domain section"
              FAILED=1
              continue
            fi

            curl -sL -X POST "https://icp.net/custom-domains/v1/${DOMAIN}" | jq .
          done

          exit $FAILED

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### ICP deployment"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Mode:** \`${{ github.event.inputs.deploy_mode || vars.ICP_DEPLOY_MODE || 'full' }}\`"
            echo "- **Backend:** \`$(jq -r '.backend' .icp/data/mappings/ic.ids.json)\`"
            echo "- **Portfolio:** \`$(jq -r '.portfolio' .icp/data/mappings/ic.ids.json)\`"
            echo "- **Site:** https://aungmyatkyaw.cv"
          } >> "$GITHUB_STEP_SUMMARY"
